<!--Exercício: Minha Primeira Página HTML
ok 1. Crie um arquivo chamado index.html e utilize as tags essenciais para estruturar corretamente sua página.
2. O documento HTML deve conter as tags de estrutura básica
3. A Página deverá suportar caracteres especiais
4. O Título da página deve ser "Minha Primeira Página HTML"
-->

<!DOCTYPE html>
<!--
	O DOCTYPE é um dtd ou é o Docuemente Type Definition. ele informa ao navegador o tipo de documento HTML que está sendo carregado, esteque estamos utilizando é a versão 5
-->

<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Minha Primeira Página HTML</title>
	</head>
	<body>
		<header>
			<h1>Minha Primeira Página HTML</h1>
		</header>
		<main>
		<section>
			<h2>Seção-1</h2>
			<p>Essa pagina é apenas um teste de estrutura.</p>
		</section>
		</main>
		<footer>
			<p>Minha Primeira Página &copy; - 2026</p>
		</footer>
	</body>
</html>
